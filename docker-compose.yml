services:
  # Cấu hình PostgreSQL 16
  db:
    image: postgres:16-alpine
    container_name: asset_sharing_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-asset_sharing}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-asset_sharing}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cấu hình Node.js Backend (NestJS + Prisma)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: asset_sharing_backend
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - DB_NAME=${DB_NAME:-asset_sharing}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-123456}@db:5432/${DB_NAME:-asset_sharing}?schema=public
      - JWT_SECRET=${JWT_SECRET:-b7f8c9d0a1e2b3c4d5e6f7a8b9c0d1e2f3a4b5c6}
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=*
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-tvkhoi123456@gmail.com}
      - SMTP_PASS=${SMTP_PASS:-fbjh zmjt hnfn pjjs}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_dist:/app/dist

  # Cấu hình ReactJS Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: asset_sharing_frontend
    restart: on-failure
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_WS_URL=ws://localhost:5000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  backend_node_modules:
  backend_dist:
  frontend_node_modules: